<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Suggestion Details - Mood Tracker</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        .article-container {
            max-width: 800px;
            margin: 40px auto;
            background: white;
            padding: 50px;
            border-radius: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.05);
        }
        .placeholder-image {
            width: 100%;
            height: 300px;
            background-color: var(--primary-purple-light);
            border-radius: 20px;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--primary-purple);
            font-weight: bold;
            font-size: 24px;
        }
        h1 { color: var(--text-black); font-size: 32px; margin-bottom: 20px; }
        p { color: var(--text-gray); margin-bottom: 20px; line-height: 1.8; font-size: 16px; }
        .back-btn {
            background-color: #F8F9FB;
            color: var(--text-black);
            text-decoration: none;
            padding: 10px 20px;
            border-radius: 12px;
            font-weight: 500;
            display: inline-block;
            margin-bottom: 30px;
        }
        .back-btn:hover { background-color: #E6EAEB; }
    </style>
</head>
<body style="background-color: var(--bg-color);">
    <div class="article-container">
        <a href="index.html" class="back-btn">← Back to Dashboard</a>
        <div class="placeholder-image" id="article-img">🧘‍♀️ Breathing Exercise</div>
        <h1 id="article-title">Loading...</h1>
        <div id="article-content" style="color: var(--text-gray); line-height: 1.8; font-size: 16px;">
        </div>
    </div>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const id = urlParams.get('id');
        
        const articles = {
            'breathing': {
                title: 'Learning Deep Breathing Everyday',
                content: '<p>Deep breathing is a proven way to reduce stress.</p><ol style="margin-left:20px; margin-top:10px;"><li>Find a quiet place.</li><li>Inhale deeply through your nose.</li><li>Exhale through your mouth.</li></ol>',
                img: '🌬️'
            },
            'focus': {
                title: 'Maintain focus session every 3 hours',
                content: '<p>Taking breaks increases cognitive load management. Try the Pomodoro technique to stay sharp!</p>',
                img: '🧠'
            },
            'grounding': {
                title: '3-Minute Grounding Breathing Exercise',
                content: '<ol style="margin-left: 20px; margin-top: 15px; display: flex; flex-direction: column; gap: 10px;"><li>Sit comfortably</li><li>Breathe in for 4 seconds</li><li>Hold for 4 seconds</li><li>Exhale slowly</li></ol><p style="margin-top:20px;">Repeat this cycle 4 times to feel instantly grounded.</p>',
                img: '🌿'
            }
        };

        const data = articles[id] || { title: 'Smart Suggestion', content: '<p>This is a custom suggestion based on your mood trends.</p>', img: '💡' };
        
        document.getElementById('article-title').textContent = data.title;
        document.getElementById('article-content').innerHTML = data.content;
        document.getElementById('article-img').textContent = data.img;
        document.title = data.title;
    </script>
    <script src="app.js"></script>
</body>
</html>
